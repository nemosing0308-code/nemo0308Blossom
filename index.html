<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>盛開｜Nemo徐毓翎</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95), rgba(255,255,255,0.72) 32%, transparent 60%),
        linear-gradient(180deg, #f8f6f2 0%, #f2efe9 52%, #ece8e1 100%);
      min-height: 100vh;
      color: #1f2937;
    }

    .soft-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 18px 50px rgba(74, 63, 53, 0.08);
    }

    .platform-btn {
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .platform-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(74, 63, 53, 0.08);
      background: rgba(255,255,255,0.95);
    }

    .cover-shadow {
      box-shadow: 0 18px 45px rgba(74, 63, 53, 0.12);
    }
  </style>
</head>
<body>
  <main class="min-h-screen flex items-center justify-center px-4 py-10 sm:px-6">
    <section class="soft-card w-full max-w-5xl rounded-[32px] overflow-hidden">
      <div class="grid md:grid-cols-2 gap-0">
        <div class="p-6 sm:p-8 md:p-10 flex items-center justify-center bg-white/35">
          <div class="w-full max-w-[380px] aspect-square rounded-[28px] overflow-hidden cover-shadow bg-[#ebe7df]">
            <img
              src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=1200&q=80"
              alt="盛開 單曲封面"
              class="w-full h-full object-cover"
            />
          </div>
        </div>

        <div class="p-6 sm:p-8 md:p-10 flex flex-col justify-center">
          <div class="inline-flex items-center gap-2 text-xs tracking-[0.24em] uppercase text-stone-500 mb-4">
            <span class="w-2 h-2 rounded-full bg-stone-400"></span>
            New Single Out Now
          </div>

          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-semibold leading-tight text-stone-900">
            盛開
          </h1>
          <p class="mt-3 text-base sm:text-lg text-stone-600">
            Nemo徐毓翎
          </p>

          <p class="mt-6 text-sm sm:text-base text-stone-500 leading-7 max-w-xl">
            點進你習慣的平台收聽這首歌。頁面已經做成手機友善版型，之後放上 GitHub Pages 就能直接當作單曲導流頁使用。
          </p>

          <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <a
              href="https://music.youtube.com/watch?v=j40Gsxg2cj8&si=bYVF2oIAfPGESx6n"
              target="_blank"
              rel="noopener noreferrer"
              class="platform-btn rounded-2xl border border-stone-200 bg-white/80 px-5 py-4 flex items-center justify-between gap-4"
            >
              <span class="flex items-center gap-3 min-w-0">
                <img src="https://cdn.simpleicons.org/youtubemusic/111827" alt="YouTube Music logo" class="w-5 h-5 shrink-0" />
                <span class="font-medium text-stone-800">YouTube Music</span>
              </span>
              <span class="text-stone-400 shrink-0">↗</span>
            </a>

            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="platform-btn rounded-2xl border border-stone-200 bg-white/80 px-5 py-4 flex items-center justify-between gap-4"
            >
              <span class="flex items-center gap-3 min-w-0">
                <img src="https://cdn.simpleicons.org/spotify/111827" alt="Spotify logo" class="w-5 h-5 shrink-0" />
                <span class="font-medium text-stone-800">Spotify</span>
              </span>
              <span class="text-stone-400 shrink-0">↗</span>
            </a>

            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="platform-btn rounded-2xl border border-stone-200 bg-white/80 px-5 py-4 flex items-center justify-between gap-4"
            >
              <span class="flex items-center gap-3 min-w-0">
                <span class="w-5 h-5 shrink-0 rounded-md bg-stone-900 text-white text-[9px] font-semibold flex items-center justify-center tracking-[0.08em]">KK</span>
                <span class="font-medium text-stone-800">KKBOX</span>
              </span>
              <span class="text-stone-400 shrink-0">↗</span>
            </a>

            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="platform-btn rounded-2xl border border-stone-200 bg-white/80 px-5 py-4 flex items-center justify-between gap-4"
            >
              <span class="flex items-center gap-3 min-w-0">
                <img src="https://cdn.simpleicons.org/youtube/111827" alt="YouTube logo" class="w-5 h-5 shrink-0" />
                <span class="font-medium text-stone-800">YouTube</span>
              </span>
              <span class="text-stone-400 shrink-0">↗</span>
            </a>
          </div>

          <div class="mt-8 pt-6 border-t border-stone-200 text-sm text-stone-400">
            Made for release day · Mobile friendly · GitHub Pages ready
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
